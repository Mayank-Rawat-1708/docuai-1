# FIX: docker-compose.yml — corrected for local dev AND Render-like environments
# Changes vs original:
#   1. CORS_ORIGINS_JSON env var (not the old CORS_ORIGINS) matches new config.py
#   2. REDIS_ENABLED=true (Redis is available in Docker Compose)
#   3. Uploads/vector_store volumes correctly mapped
#   4. frontend passes VITE_API_URL build arg for local dev

version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: docuai
      POSTGRES_PASSWORD: docuai_pass
      POSTGRES_DB: docuai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuai"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://docuai:docuai_pass@db:5432/docuai
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production-32chars-min}
      DEBUG: ${DEBUG:-false}
      # FIX: use CORS_ORIGINS_JSON to match new config.py
      CORS_ORIGINS_JSON: '["http://localhost:3000","http://localhost:80","http://localhost:5173","http://frontend"]'
      UPLOAD_DIR: /app/uploads
      VECTOR_STORE_DIR: /app/vector_store
    volumes:
      - uploads_data:/app/uploads
      - vector_store_data:/app/vector_store
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # FIX: pass backend URL at build time so Vite embeds it
        VITE_API_URL: ""  # empty = use relative /api/v1 path (nginx proxies it)
    restart: unless-stopped
    ports:
      - "80:80"
    environment:
      BACKEND_URL: http://backend:8000  # for nginx envsubst at runtime
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
  vector_store_data:
