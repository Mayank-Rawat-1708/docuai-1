# Alembic Configuration File
# the output encoding used when revision files are written from script.py.mako
# this can be used to change the character encoding of the migration file when using unicode characters in comments or docstrings

sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

# The alembic section of the ini file is used to establish
# a connection to the database; an example section looks like this:
# [sqlalchemy]
# sqlalchemy.url = postgresql://user:password@host/database

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration file names; The default value is %%(rev)s_%%(slug)s
# Uncomment the line below if you want the files to be prepended with date and time
#file_template = %%(rev)s_%%(slug)s_%%(ts_now)s

# sys.path path, will be prepended to sys.path if present
# defaults to the current directory
prepend_sys_path = .

# timezone to use when rendering the date within the migration file as well as the filename.
# string value is passed to the `tzinfo` argument of datetime.datetime()
# leave blank for localtime
# timezone =

# max length of characters to apply to the "slug" field
# set to 0 to disable, omitting this setting or setting it to -1 is equivalent to no character limit
# truncate_slug_identifier = 40

# set to 'true' to run the environment during the 'revision' command, regardless of autogenerate
# this is useful and needed for Alembic comment support
# always_detach_and_render = false
