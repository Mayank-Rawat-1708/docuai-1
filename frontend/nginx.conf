# FIX: nginx.conf — Render-compatible frontend config
# Changes vs original:
#   1. /api/v1/ proxy passes to BACKEND_URL (set at Docker build time via --build-arg)
#   2. SSE (Server-Sent Events) streaming works: proxy_buffering off, correct headers
#   3. SPA fallback: all non-asset routes serve index.html (React Router)
#   4. Gzip enabled for faster asset delivery

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # ── Static assets (JS, CSS, images) ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → FastAPI backend ─────────────────────────────────────────
    # BACKEND_URL is substituted by envsubst in Docker entrypoint (see Dockerfile fix)
    # Falls back to http://backend:8000 for Docker Compose local dev
    location /api/ {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection        "";

        # FIX: SSE streaming — disable buffering for /chat endpoints
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 300s;  # long timeout for AI responses
        proxy_send_timeout 300s;

        # CORS handled by FastAPI — don't double-add headers here
    }

    # ── React SPA fallback ─────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
